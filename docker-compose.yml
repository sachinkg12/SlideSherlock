services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: slidesherlock
      POSTGRES_PASSWORD: slidesherlock
      POSTGRES_DB: slidesherlock
    ports:
      - "5433:5432"  # Use 5433 to avoid conflict with local PostgreSQL
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slidesherlock"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  pgadmin:
    # Pin to 8.11: "latest" has known Docker init/auth issues (8.12+, 8.7)
    image: dpage/pgadmin4:8.11
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    # No healthcheck: pgAdmin starts slowly; healthcheck can cause restarts before it's ready

  api:
    build: .
    command: sh -c "alembic upgrade head && uvicorn apps.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://slidesherlock:slidesherlock@postgres:5432/slidesherlock
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: slidesherlock
      MINIO_SECURE: "false"
      PYTHONPATH: /app:/app/packages/core
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build: .
    command: rq worker jobs --url redis://redis:6379
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://slidesherlock:slidesherlock@postgres:5432/slidesherlock
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: slidesherlock
      MINIO_SECURE: "false"
      PYTHONPATH: /app:/app/packages/core
      OBJC_DISABLE_INITIALIZE_FORK_SAFETY: "YES"
      NO_PROXY: "*"
      OVERLAY_PARALLEL: "1"
      TTS_PARALLEL: "1"
      SKIP_STAGE_CACHE: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  pgadmin_data: