[tool.pytest.ini_options]
testpaths = ["packages/core/tests", "apps/api/tests"]
python_files = "test_*.py"
python_functions = "test_*"
addopts = "--tb=short -q"
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.coverage.run]
source = ["packages/core", "apps/api"]
omit = [
    "*/tests/*",
    "*/migrations/*",
    "*/__pycache__/*",
    "*/stages/__init__.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 50
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]

[tool.black]
line-length = 100
target-version = ["py311"]
