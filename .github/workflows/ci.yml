name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: slidesherlock
          POSTGRES_PASSWORD: slidesherlock
          POSTGRES_DB: slidesherlock
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U slidesherlock"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: bitnami/minio:latest
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://slidesherlock:slidesherlock@localhost:5433/slidesherlock
      REDIS_URL: redis://localhost:6379
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: slidesherlock

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run database migrations
        run: |
          PYTHONPATH=.:packages/core alembic upgrade head

      - name: Run tests (152 tests)
        run: |
          PYTHONPATH=.:packages/core pytest packages/core/tests/ apps/api/tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linters
        run: pip install black==23.11.0 flake8==6.1.0

      - name: Check formatting (black)
        run: black --check --line-length 100 packages/core/ apps/api/ scripts/

      - name: Lint (flake8)
        run: flake8 --max-line-length=100 --exclude=__pycache__,venv,node_modules packages/core/ apps/api/ scripts/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        working-directory: apps/web
        run: pnpm exec tsc --noEmit

      - name: Build frontend
        working-directory: apps/web
        run: pnpm build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t slidesherlock:ci .
