<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Slide shape -->
  <rect x="4" y="8" width="32" height="24" rx="3" fill="#6c63ff" opacity="0.9"/>
  <!-- Slide lines representing content -->
  <rect x="8" y="14" width="18" height="2.5" rx="1.25" fill="white" opacity="0.85"/>
  <rect x="8" y="19" width="12" height="2" rx="1" fill="white" opacity="0.6"/>
  <rect x="8" y="23" width="15" height="2" rx="1" fill="white" opacity="0.6"/>
  <!-- Magnifying glass -->
  <circle cx="36" cy="34" r="8" fill="#0f0f1a" stroke="#6c63ff" stroke-width="2.5"/>
  <circle cx="36" cy="34" r="4.5" stroke="#9d97ff" stroke-width="2"/>
  <line x1="41" y1="39" x2="45" y2="43" stroke="#6c63ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Highlight dot on slide -->
  <circle cx="26" cy="21" r="2.5" fill="#ffd166" opacity="0.9"/>
</svg>
