<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlideSherlock Pipeline Architecture</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0e1a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'SF Pro Display', -apple-system, 'Segoe UI', sans-serif;
  overflow: hidden;
}

svg { width: 1200px; height: 720px; }

/* Color-blind safe palette (Wong 2011 adapted for dark bg) */
/* Blue #4DA6FF | Orange #FFB347 | Teal #2DD4A8 | Yellow #FFE066 | Vermillion #FF6B35 | Pink #E090C0 | Sky #7EC8E3 */

.node-box { rx: 12; ry: 12; stroke-width: 2; }
.node-label { font-size: 14px; font-weight: 700; fill: #f1f5f9; text-anchor: middle; dominant-baseline: central; letter-spacing: 0.5px; }
.node-sublabel { font-size: 10px; font-weight: 400; fill: #cbd5e1; text-anchor: middle; dominant-baseline: central; }
.section-label { font-size: 12px; font-weight: 700; fill: #94a3b8; text-anchor: start; letter-spacing: 1.5px; text-transform: uppercase; }
.io-icon { font-size: 30px; text-anchor: middle; dominant-baseline: central; }

/* Animated glow on edges */
@keyframes edgeGlow {
  0%, 100% { stroke-opacity: 0.35; }
  50% { stroke-opacity: 1; }
}

.edge-glow {
  stroke-width: 3;
  fill: none;
  animation: edgeGlow 2.5s ease-in-out infinite;
}

/* Verifier loop pulse */
@keyframes loopGlow {
  0%, 100% { stroke-opacity: 0.3; }
  50% { stroke-opacity: 1; }
}
.verify-loop { animation: loopGlow 1.8s ease-in-out infinite; }

/* Evidence badge pulse */
@keyframes badgePulse {
  0%, 100% { r: 4; opacity: 0.5; }
  50% { r: 7; opacity: 1; }
}
.evidence-dot { animation: badgePulse 2s ease-in-out infinite; }
</style>
</head>
<body>

<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Color-blind safe gradients (dark bg compatible, high contrast) -->
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3d6e"/><stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#115e59"/><stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <linearGradient id="gYellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#422006"/><stop offset="100%" style="stop-color:#854d0e"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b0764"/><stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="gOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c2d12"/><stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="gVermillion" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7f1d1d"/><stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="gPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#701a75"/><stop offset="100%" style="stop-color:#c026d3"/>
    </linearGradient>
    <linearGradient id="gSky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e"/><stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>

    <!-- Arrow markers (bright, high-contrast) -->
    <marker id="arrBlue" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#4DA6FF"/>
    </marker>
    <marker id="arrTeal" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2DD4A8"/>
    </marker>
    <marker id="arrYellow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#FFE066"/>
    </marker>
    <marker id="arrPurple" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#B794F4"/>
    </marker>
    <marker id="arrOrange" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#FFB347"/>
    </marker>
    <marker id="arrVerm" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#FF6B35"/>
    </marker>
    <marker id="arrPink" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#E090C0"/>
    </marker>
    <marker id="arrSky" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#7EC8E3"/>
    </marker>

    <!-- Particle glow -->
    <filter id="particleGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="#0a0e1a"/>
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="720" fill="url(#grid)"/>
  </g>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#f1f5f9" font-size="24" font-weight="700" letter-spacing="1px">SlideSherlock Pipeline</text>
  <text x="600" y="66" text-anchor="middle" fill="#94a3b8" font-size="13" letter-spacing="0.5px">Evidence-Grounded Presentation-to-Video</text>

  <!-- ===== INPUT ===== -->
  <text x="55" y="165" text-anchor="middle" dominant-baseline="central" fill="#4DA6FF" font-size="40">&#128196;</text>
  <text x="55" y="202" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">PPTX</text>

  <!-- ===== SHARED STAGES ===== -->
  <text class="section-label" x="130" y="118">Shared Stages</text>
  <line x1="130" y1="126" x2="1060" y2="126" stroke="#1e293b" stroke-width="1"/>

  <!-- EDGES (shared) — glowing, color-blind safe colors, staggered -->
  <!-- Input → Ingest -->
  <line class="edge-glow" x1="85" y1="178" x2="128" y2="185" stroke="#4DA6FF" marker-end="url(#arrBlue)" style="animation-delay: 0s"/>

  <!-- Ingest → Evidence -->
  <line class="edge-glow" x1="270" y1="185" x2="328" y2="185" stroke="#4DA6FF" marker-end="url(#arrTeal)" style="animation-delay: 0.5s"/>
  <circle r="4.5" fill="#4DA6FF" filter="url(#particleGlow)">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M 270,185 L 328,185" begin="0s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Evidence → Render -->
  <line class="edge-glow" x1="470" y1="185" x2="528" y2="185" stroke="#2DD4A8" marker-end="url(#arrYellow)" style="animation-delay: 1s"/>
  <circle r="4.5" fill="#2DD4A8" filter="url(#particleGlow)">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M 470,185 L 528,185" begin="0.5s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

  <!-- Render → Graph -->
  <line class="edge-glow" x1="670" y1="185" x2="728" y2="185" stroke="#FFE066" marker-end="url(#arrPurple)" style="animation-delay: 1.5s"/>
  <circle r="4.5" fill="#FFE066" filter="url(#particleGlow)">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M 670,185 L 728,185" begin="1s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="1s"/>
  </circle>

  <!-- NODES (shared) — solid fill, thick contrasting borders, larger labels -->
  <!-- Ingest (Blue) -->
  <rect class="node-box" x="130" y="155" width="140" height="60" fill="url(#gBlue)" stroke="#4DA6FF"/>
  <text class="node-label" x="200" y="177">Ingest</text>
  <text class="node-sublabel" x="200" y="198">parse + extract images</text>

  <!-- Evidence (Teal) -->
  <rect class="node-box" x="330" y="155" width="140" height="60" fill="url(#gTeal)" stroke="#2DD4A8"/>
  <text class="node-label" x="400" y="177">Evidence</text>
  <text class="node-sublabel" x="400" y="198">SHA-256 index + vision</text>
  <line x1="400" y1="215" x2="400" y2="232" stroke="#2DD4A8" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <circle class="evidence-dot" cx="400" cy="238" r="5" fill="#2DD4A8" filter="url(#particleGlow)"/>
  <text x="400" y="258" text-anchor="middle" fill="#5eead4" font-size="9.5" font-weight="500">evidence IDs</text>

  <!-- Render (Yellow) -->
  <rect class="node-box" x="530" y="155" width="140" height="60" fill="url(#gYellow)" stroke="#FFE066"/>
  <text class="node-label" x="600" y="177">Render</text>
  <text class="node-sublabel" x="600" y="198">PDF &#8594; PNG slides</text>

  <!-- Graph (Purple) -->
  <rect class="node-box" x="730" y="155" width="140" height="60" fill="url(#gPurple)" stroke="#B794F4"/>
  <text class="node-label" x="800" y="177">Graph</text>
  <text class="node-sublabel" x="800" y="198">G_native + G_vision</text>
  <g transform="translate(800, 236)">
    <rect x="-45" y="-10" width="90" height="28" rx="6" fill="#1e1b4b" stroke="#6d28d9" stroke-width="0.5" opacity="0.6"/>
    <circle r="4" cx="-22" fill="#B794F4"/>
    <text x="-10" y="4" fill="#c4b5fd" font-size="8.5">native</text>
    <circle r="4" cx="22" fill="#2DD4A8"/>
    <text x="34" y="4" fill="#5eead4" font-size="8.5">vision</text>
  </g>
  <text x="800" y="272" text-anchor="middle" fill="#B794F4" font-size="9" font-weight="500">&#8594; G_unified</text>

  <!-- ===== CONNECTOR: Shared → Per-Variant ===== -->
  <path d="M 800,215 L 800,300 L 200,300 L 200,400" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="500" y="320" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="500" font-style="italic">per variant (en, hi-IN, ...)</text>
  <circle r="3.5" fill="#94a3b8" filter="url(#particleGlow)" opacity="0.5">
    <animateMotion dur="4s" repeatCount="indefinite" path="M 800,215 L 800,300 L 200,300 L 200,400" begin="1.5s"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" dur="4s" repeatCount="indefinite" begin="1.5s"/>
  </circle>

  <!-- ===== PER-VARIANT STAGES ===== -->
  <text class="section-label" x="130" y="380">Per-Variant Stages</text>
  <line x1="130" y1="386" x2="1170" y2="386" stroke="#1e293b" stroke-width="1"/>

  <!-- EDGES (variant) — glowing, distinct colors -->
  <!-- Script → Verify -->
  <line class="edge-glow" x1="270" y1="430" x2="328" y2="430" stroke="#FFB347" marker-end="url(#arrVerm)" style="animation-delay: 2s"/>
  <circle r="4.5" fill="#FFB347" filter="url(#particleGlow)">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M 270,430 L 328,430" begin="2s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="2s"/>
  </circle>

  <!-- Verify → Narrate -->
  <line class="edge-glow" x1="470" y1="430" x2="528" y2="430" stroke="#FF6B35" marker-end="url(#arrPink)" style="animation-delay: 2.5s"/>
  <circle r="4.5" fill="#FF6B35" filter="url(#particleGlow)">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M 470,430 L 528,430" begin="2.5s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="2.5s"/>
  </circle>

  <!-- Narrate → Audio -->
  <line class="edge-glow" x1="670" y1="430" x2="728" y2="430" stroke="#E090C0" marker-end="url(#arrSky)" style="animation-delay: 3s"/>
  <circle r="4.5" fill="#E090C0" filter="url(#particleGlow)">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M 670,430 L 728,430" begin="3s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="3s"/>
  </circle>

  <!-- Audio → Video -->
  <line class="edge-glow" x1="870" y1="430" x2="928" y2="430" stroke="#7EC8E3" marker-end="url(#arrBlue)" style="animation-delay: 3.5s"/>
  <circle r="4.5" fill="#7EC8E3" filter="url(#particleGlow)">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M 870,430 L 928,430" begin="3.5s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="3.5s"/>
  </circle>

  <!-- Video → Output -->
  <line class="edge-glow" x1="1070" y1="430" x2="1118" y2="430" stroke="#4DA6FF" style="animation-delay: 4s"/>
  <circle r="4.5" fill="#4DA6FF" filter="url(#particleGlow)">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M 1070,430 L 1118,430" begin="4s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="4s"/>
  </circle>

  <!-- NODES (variant) -->
  <!-- Script (Orange) -->
  <rect class="node-box" x="130" y="400" width="140" height="60" fill="url(#gOrange)" stroke="#FFB347"/>
  <text class="node-label" x="200" y="422">Script</text>
  <text class="node-sublabel" x="200" y="443">narration + claims</text>

  <!-- Verify (Vermillion) -->
  <rect class="node-box" x="330" y="400" width="140" height="60" fill="url(#gVermillion)" stroke="#FF6B35"/>
  <text class="node-label" x="400" y="422">Verify</text>
  <text class="node-sublabel" x="400" y="443">PASS / REWRITE / REMOVE</text>

  <!-- VERIFIER LOOP -->
  <path d="M 400,460 L 400,540 Q 300,565 200,540 L 200,460" fill="none" stroke="#FF6B35" stroke-width="2.5" stroke-dasharray="5,3" class="verify-loop" marker-end="url(#arrVerm)"/>
  <text x="300" y="548" text-anchor="middle" fill="#FF6B35" font-size="10" font-weight="600">verifier loop</text>
  <circle r="4.5" fill="#FF6B35" filter="url(#particleGlow)">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M 400,460 L 400,540 Q 300,565 200,540 L 200,460" begin="0s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Narrate (Pink) -->
  <rect class="node-box" x="530" y="400" width="140" height="60" fill="url(#gPink)" stroke="#E090C0"/>
  <text class="node-label" x="600" y="422">Narrate</text>
  <text class="node-sublabel" x="600" y="443">GPT rewrite (optional)</text>

  <!-- Audio (Sky blue) -->
  <rect class="node-box" x="730" y="400" width="140" height="60" fill="url(#gSky)" stroke="#7EC8E3"/>
  <text class="node-label" x="800" y="422">Audio</text>
  <text class="node-sublabel" x="800" y="443">TTS + alignment</text>

  <!-- Video (Blue) -->
  <rect class="node-box" x="930" y="400" width="140" height="60" fill="url(#gBlue)" stroke="#4DA6FF"/>
  <text class="node-label" x="1000" y="422">Video</text>
  <text class="node-sublabel" x="1000" y="443">overlay + compose</text>

  <!-- ===== OUTPUT ===== -->
  <text x="1145" y="405" text-anchor="middle" dominant-baseline="central" fill="#4DA6FF" font-size="40">&#127916;</text>
  <text x="1145" y="442" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">MP4</text>
  <text x="1145" y="460" text-anchor="middle" fill="#94a3b8" font-size="9.5">+ .srt + metrics</text>

  <!-- ===== INFRASTRUCTURE BAR ===== -->
  <line x1="130" y1="590" x2="1070" y2="590" stroke="#1e293b" stroke-width="1"/>

  <g transform="translate(200, 620)">
    <rect x="-65" y="-18" width="130" height="38" rx="8" fill="#1e293b" stroke="#2DD4A8" stroke-width="1" stroke-opacity="0.4"/>
    <text x="0" y="-1" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="500">MinIO / LocalFS</text>
    <text x="0" y="14" text-anchor="middle" fill="#94a3b8" font-size="9">StorageBackend protocol</text>
  </g>

  <g transform="translate(420, 620)">
    <rect x="-65" y="-18" width="130" height="38" rx="8" fill="#1e293b" stroke="#4DA6FF" stroke-width="1" stroke-opacity="0.4"/>
    <text x="0" y="-1" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="500">Postgres / SQLite</text>
    <text x="0" y="14" text-anchor="middle" fill="#94a3b8" font-size="9">DB initializer registry</text>
  </g>

  <g transform="translate(640, 620)">
    <rect x="-65" y="-18" width="130" height="38" rx="8" fill="#1e293b" stroke="#B794F4" stroke-width="1" stroke-opacity="0.4"/>
    <text x="0" y="-1" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="500">10 LLM Providers</text>
    <text x="0" y="14" text-anchor="middle" fill="#94a3b8" font-size="9">OCP registry pattern</text>
  </g>

  <g transform="translate(860, 620)">
    <rect x="-65" y="-18" width="130" height="38" rx="8" fill="#1e293b" stroke="#7EC8E3" stroke-width="1" stroke-opacity="0.4"/>
    <text x="0" y="-1" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="500">Docker / pip install</text>
    <text x="0" y="14" text-anchor="middle" fill="#94a3b8" font-size="9">dual deployment mode</text>
  </g>

  <text x="600" y="682" text-anchor="middle" fill="#475569" font-size="10" font-weight="500" letter-spacing="2px">INFRASTRUCTURE — OPEN/CLOSED PRINCIPLE — EXTEND VIA REGISTRIES, NEVER MODIFY</text>

  <g transform="translate(1110, 680)">
    <rect x="-35" y="-12" width="70" height="22" rx="10" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="0" y="2" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="500">v1.1.0</text>
  </g>
</svg>

</body>
</html>
